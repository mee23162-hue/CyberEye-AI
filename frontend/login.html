<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PhishGuard Login</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- TOP NAVBAR -->
<div class="top-bar">
    <a href="index.html" class="home-btn">← Back To Home</a>
</div>

<!-- HERO -->
<div class="hero-section">

<div class="login-image">

<div class="overlay">

<img src="image/logo.png" class="hero-logo">

<h1>AI PhishGuard</h1>

<p>Phishing Email Detection System</p>

<button class="open-login-btn" onclick="showLogin()">
Login
</button>

</div>

</div>

</div>

<!-- LOGIN POPUP -->
<div class="popup" id="loginPopup">

<div class="popup-content modern-login">

<span class="close" onclick="closeLogin()">×</span>

<h2>Sign In</h2>

<button class="google-btn" onclick="googleLogin()">
<img src="https://img.icons8.com/color/48/google-logo.png">
Continue with Google
</button>

<div class="divider">
<span>OR</span>
</div>

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<div class="forgot-box">
<a href="#">Forgot Password?</a>
</div>

<button class="login-btn" onclick="loginUser()">
Sign In
</button>

<p class="signup-text">
Don't have an account?
<a href="#" onclick="openSignup()">Sign Up</a>
</p>

</div>

</div>

<!-- SIGNUP POPUP -->
<div class="popup" id="signupPopup">

<div class="popup-content modern-login">

<span class="close" onclick="closeSignup()">×</span>

<h2>Create Account</h2>

<button class="google-btn" onclick="googleSignup()">
<img src="https://img.icons8.com/color/48/google-logo.png">
Sign up with Google
</button>

<div class="divider">
<span>OR</span>
</div>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<input type="password" id="signupConfirmPassword" placeholder="Confirm Password">

<div class="terms-box">
<input type="checkbox" id="terms">
<label for="terms">I agree to Terms & Conditions</label>
</div>


<button class="login-btn" onclick="signupUser()">
Sign Up
</button>

<p class="signup-text">
Already have account?
<a href="#" onclick="openLogin()">Login</a>
</p>

</div>

</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen">

<div class="loader"></div>

<h2>AI Security Scan</h2>

<p id="loadingText">
Checking Credentials...
</p>

</div>

<script src="login.js"></script>

</body>
</html>
